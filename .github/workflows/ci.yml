name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # GitHub runners have Docker pre-installed - Testcontainers will use it automatically
    # Ollama is installed directly on the runner for embedding generation

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    # Cache must be restored BEFORE Ollama is set up so the pulled model is available immediately
    - name: Cache Ollama models
      uses: actions/cache@v4
      with:
        path: ~/.ollama
        key: ${{ runner.os }}-ollama-nomic-embed-text-v1
        restore-keys: |
          ${{ runner.os }}-ollama-nomic-embed-text-
          ${{ runner.os }}-ollama-

    - name: Setup Ollama
      uses: ai-action/setup-ollama@v2

    - name: Start Ollama service
      run: |
        ollama serve &
        sleep 5

    - name: Pull embedding model
      run: |
        ollama pull nomic-embed-text
        ollama list

    # Unit tests run fast with no external dependencies
    - name: Run unit tests
      run: dotnet test --no-build --configuration Release --filter "Category=Unit" --verbosity normal --logger "trx;LogFileName=unit-tests.trx"

    # Integration tests run with coverage collection — no separate coverage-only pass needed
    - name: Run integration tests
      run: dotnet test --no-build --configuration Release --filter "Category=Integration" --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --collect:"XPlat Code Coverage"
      # Testcontainers spins up a single shared PostgreSQL + MinIO pair (SharedWebAppFixture)
      # Ollama runs directly on the host for embedding generation

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/*.trx'

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: success()
      with:
        files: '**/coverage.cobertura.xml'
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Generate test badge
      if: always() && github.ref == 'refs/heads/main'
      run: |
        # Parse pass/fail counts from TRX files
        PASSED=0
        FAILED=0
        for trx in $(find . -name '*.trx' -type f); do
          P=$(grep -oP 'passed="\K[0-9]+' "$trx" | head -1)
          F=$(grep -oP 'failed="\K[0-9]+' "$trx" | head -1)
          PASSED=$((PASSED + ${P:-0}))
          FAILED=$((FAILED + ${F:-0}))
        done
        TOTAL=$((PASSED + FAILED))

        if [ "$FAILED" -gt 0 ]; then
          MESSAGE="${PASSED}/${TOTAL} passing"
          COLOR="red"
        else
          MESSAGE="${PASSED} passing"
          COLOR="brightgreen"
        fi

        mkdir -p .badges
        echo "{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"${MESSAGE}\",\"color\":\"${COLOR}\"}" > .badges/tests.json

    - name: Publish test badge
      if: always() && github.ref == 'refs/heads/main'
      run: |
        cd .badges
        git init --initial-branch badges
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add tests.json
        git commit -m "Update test badge"
        git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" badges

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check formatting
      run: dotnet format --verify-no-changes --no-restore
      continue-on-error: true

    - name: Run code analysis
      run: dotnet build --no-restore --configuration Release /p:EnforceCodeStyleInBuild=true /p:TreatWarningsAsErrors=true
      continue-on-error: true
