name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build-cli:
    name: Build CLI (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: connapse.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: connapse
          - rid: osx-x64
            os: macos-latest
            artifact: connapse
          - rid: osx-arm64
            os: macos-latest
            artifact: connapse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish CLI (${{ matrix.rid }})
        run: >
          dotnet publish src/Connapse.CLI/Connapse.CLI.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:EnableCompressionInSingleFile=true
          --output publish/${{ matrix.rid }}

      - name: Rename binary (non-Windows)
        if: matrix.rid != 'win-x64'
        run: mv publish/${{ matrix.rid }}/connapse publish/${{ matrix.rid }}/connapse-${{ matrix.rid }}

      - name: Rename binary (Windows)
        if: matrix.rid == 'win-x64'
        run: Rename-Item publish/${{ matrix.rid }}/connapse.exe connapse-${{ matrix.rid }}.exe
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: connapse-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/connapse-${{ matrix.rid }}*
          retention-days: 1

  publish-nuget:
    name: Publish NuGet global tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack NuGet tool
        run: >
          dotnet pack src/Connapse.CLI/Connapse.CLI.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output nupkgs

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY not set — skipping NuGet publish"
            exit 0
          fi
          dotnet nuget push nupkgs/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: connapse-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Installation

            ### Binary (no .NET required)
            Download the binary for your platform below and add it to your PATH:
            - **Windows**: `connapse-win-x64.exe`
            - **Linux**: `connapse-linux-x64`
            - **macOS (Intel)**: `connapse-osx-x64`
            - **macOS (Apple Silicon)**: `connapse-osx-arm64`

            ```bash
            # Linux / macOS
            chmod +x connapse-linux-x64
            sudo mv connapse-linux-x64 /usr/local/bin/connapse
            ```

            ### .NET Global Tool (requires .NET 10 SDK)
            ```bash
            dotnet tool install -g Connapse.CLI --version ${{ github.ref_name }}
            ```

            ## Getting started
            ```bash
            connapse auth login        # authenticate with your Connapse server
            connapse search "query"    # search your knowledge base
            connapse --help            # see all commands
            ```
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
