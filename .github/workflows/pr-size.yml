name: PR Size

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-size:
    runs-on: ubuntu-latest
    steps:
      - uses: pascalgn/size-label-action@v0.5.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILES_TO_IGNORE: >
            .claude/**
            .github/**
            docs/**
            *.md
            *.yml
            *.yaml
            *.json
            *.lock
        with:
          sizes: >
            {
              "0": "XS",
              "50": "S",
              "150": "M",
              "300": "L",
              "500": "XL"
            }

  warn-large:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count only code changes — exclude docs, config, and generated files
          TOTAL=$(git diff --numstat origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }} \
            -- . \
            ':!*.md' \
            ':!*.yml' \
            ':!*.yaml' \
            ':!*.json' \
            ':!*.lock' \
            ':!.claude/**' \
            ':!.github/**' \
            ':!docs/**' \
            | awk '{ adds += $1; dels += $2 } END { print adds + dels }')
          TOTAL=${TOTAL:-0}

          if [ "$TOTAL" -gt 500 ]; then
            gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "## ⚠️ Large PR Warning

          This PR has **$TOTAL lines of code** changed (excluding docs, config, and generated files).

          Our target is **under 300 lines** per PR. Please consider splitting this into smaller, focused PRs:

          - Separate refactoring from feature work
          - Split data layer / service layer / UI into separate PRs
          - Extract test additions into their own PR if needed"
          fi
